<!DOCTYPE html>
<html>
<head>
    <title>PortalHTML Alpha</title>
    <style>
        body {
            font-family: Verdana, sans-serif;
            font-size: 18pt;
            color: gray;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            border: 1px solid gray;
            padding: 25px;
            text-align: center;
            width: 50%;
        }

        .link-item {
            margin-top: 20px;
        }

        a {
            display: inline-block;
            background: #f0f0f0;
            color: gray;
            padding: 10px 20px;
            margin: 10px 0;
            text-decoration: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
            width: 80%; /* Consistent width for all buttons */
        }

        a:hover {
            background: #e0e0e0;
            border-color: #999;
        }

        /* Warning Style for the Broken Update */
        .btn-danger {
            color: #721c24 !important;
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
        }

        .btn-danger:hover {
            background-color: #f1b0b7 !important;
        }

        /* Disabled Style for Survival Test */
        .btn-disabled {
            background-color: #eee !important;
            color: #bbb !important;
            border-color: #ddd !important;
            cursor: not-allowed;
            pointer-events: none; /* Prevents clicking */
        }

        a:active:not(.btn-disabled) {
            transform: translateY(2px);
        }

        b { font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <p>Welcome to the home of <b>PortalHTML!</b></p>
        <p>Current Update: a0.0.2</p>
        <p>WARNING: This is built off an old index. Stuff may be incomplete until new index</p>
        <p>Click the link below to test PortalHTML!</p>
        
        <div class="link-item">
            <a href="game.html">Play PortalHTML!</a>
        </div>
    </div>

</body>
</html>
