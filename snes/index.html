<!DOCTYPE html>
<html lang="en-us"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    
    <title>Snes9x Test - Under Construction</title>
    <style>
      .emscripten { padding-right: 0; margin-left: auto; margin-right: auto; display: block; }
      textarea.emscripten { font-family: monospace; width: 80%; }
      div.emscripten, h1 { text-align: center; }
      div.emscripten_border { border: 1px solid black; }
      #fakerom { font-size: 20pt; margin: 5pt;}
      /* the canvas *must not* have any border or padding, or mouse coords will be wrong */
      canvas.emscripten { border: 0px none; }
	  body {
			font-family: "Arial", sans-serif;
			background-color: #B7B7B7;
	  }
    </style>
  </head>
  <body>
    <h1>Snes9x Test - Under Construction</h1>
    <hr>
    <div class="emscripten" id="status"></div>
    <div class="emscripten">
      <progress value="0" max="1" id="progress" hidden=""></progress>  
    </div>
    <div class="emscripten_border" id="canvas_div" style="display: none">
      <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    </div>
	<div class="emscripten emscripten_border" id="openrom">
      <button id="fakerom" onclick="loadRomFromServer()">Play! (Temporary Button)</button>
    </div>
    <hr>
    <div class="emscripten">
      <input type="button" value="Fullscreen" onclick="Module.requestFullScreen"><br>
    </div>
    
    <hr>
	<textarea class="emscripten" id="output" rows="8" style="display: none;"></textarea> <!-- This has been hidden. If you really wanna debug this, then go ahead and remove style="display: none;" from the code. -->
    <div class="emscripten" id="controls">
      Controls:<br>
      <br>
      A button: X<br>
      B button: Z<br>
      X button: S<br>
      Y button: A<br>
      L button: Q<br>
      R button: W<br>
      D-Pad: Arrow Keys<br>
      Start: Enter<br>
      Select: Shift
    </div>
    <script type="text/javascript">
      var count = 0;
	function loadRomFromServer() {
        document.getElementById("openrom").style.display = 'none';
        Module.setStatus('Downloading ROM...');
        
        var romName = 'linktothepast.sfc';
        var romUrl = 'roms/' + romName;

        // Fetch the ROM from your server
        fetch(romUrl)
          .then(function(response) {
            if (!response.ok) throw new Error("Network response was not ok");
            return response.arrayBuffer();
          })
          .then(function(buffer) {
            initFromData(buffer, romName);
          })
          .catch(function(error) {
            console.error("ROM could not be downloaded FUCK:", error);
            Module.setStatus("Report this error!!! The ROM path is wrong, or does not exist!");
          });
      }

      function initFromData(data, name) {
        var dataView = new Uint8Array(data);
        Module.FS_createDataFile('/', name, dataView, true, false);
        
        Module.FS_createFolder('/', 'etc', true, true);
        var config = 'input_player1_select = shift\n';
          
        Module.FS_createDataFile('/etc', 'retroarch.cfg', config, true, true);
        
        document.getElementById('canvas_div').style.display = 'block';
        Module['arguments'] = ["-v", "/" + name];
        
        Module['callMain'](Module['arguments']);
      }
    </script>
    <script type="text/javascript">
      var Module = {
	     noInitialRun: true,
		  arguments: ["-v", "--menu"],
        preRun: [],
        postRun: [],
        print: (function() {
          var element = document.getElementById('output');
          element.value = '';
          return function(text) {
            text = Array.prototype.slice.call(arguments).join(' ');
            element.value += text + "\n";
            element.scrollTop = 99999;
          };
        })(),
        printErr: function(text) {
          var text = Array.prototype.slice.call(arguments).join(' ');
          var element = document.getElementById('output');
          element.value += text + "\n";
          element.scrollTop = 99999;
        },
        canvas: document.getElementById('canvas'),
        setStatus: function(text) {
          if (Module.setStatus.interval) clearInterval(Module.setStatus.interval);
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var statusElement = document.getElementById('status');
          var progressElement = document.getElementById('progress');
          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2])*100;
            progressElement.max = parseInt(m[4])*100;
            progressElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
          }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Hold on... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      Module.setStatus('One second...');
    </script>
	<script type="text/javascript" src="snes9x/snes9x-next.js"></script></body></html>
