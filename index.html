<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IsabelleWasTaken</title>
    <style>
        /* Base page styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Dark background */
            color: #e0e0e0; /* Light grey text */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* The main content box */
        .container {
            background-color: #1e1e1e;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #bb86fc; /* A nice neon purple accent */
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        /* Link grouping */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Button styling */
        a.btn {
            text-decoration: none;
            color: #ffffff;
            background-color: #333333;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease; /* Smooth hover effect */
        }

        /* What happens when you hover over a button */
        a.btn:hover {
            background-color: #bb86fc;
            color: #121212;
            transform: translateY(-2px); /* Moves the button up slightly */
        }

        /* Styling for the "Coming Soon" button */
        a.btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none; /* Prevents clicking */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>IsabelleWasTaken's Website</h1>
        <p>Greetings! Feel free to play a game below.</p>
        
        <div class="button-group">
            <p>EduEngine</p>
            <a href="educraft/index.html" class="btn">Educraft Alpha</a>
            <a href="portalhtml/index.html" class="btn">PortalHTML Alpha Test</a>
            <a href="edukart/index.html" class="btn">EduKart Tech Demo</a>
            <p>Misc</p>
            <a href="eaglercraft/game.html" class="btn">EaglercraftX 1.8</a>
            <a href="#" class="btn disabled">Sporcle World Map Quiz</a>
        </div>
    </div>

</body>
</html>
