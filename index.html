<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IsabelleWasTaken's Corner</title>
    <style>
        :root {
            --steam-dark: #1b2838;
            --steam-sidebar: #2a475e;
            --steam-blue: #66c0f4;
            --steam-green: #5c7e10;
            --steam-green-hover: #a1cf1e;
            --text-light: #c6d4df;
            --text-muted: #8f98a0;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--steam-dark);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background-color: rgba(0, 0, 0, 0.3);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 0.8em;
            font-weight: bold;
            color: var(--steam-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .game-list {
            flex: 1;
            overflow-y: auto;
        }

        .sidebar-item {
            padding: 8px 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9em;
            cursor: pointer;
            transition: 0.2s;
        }

        .sidebar-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .sidebar-item.active { background: var(--steam-sidebar); color: #fff; }

        /* Main View Container */
        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #2d4458 0%, #1b2838 40%);
        }

        /* Hero Image/Logo Area */
        .hero {
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .hero h1 {
            font-size: 4em;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Steam Action Bar */
        .action-bar {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .play-btn {
            background: linear-gradient(to right, #75b022, #588a1b);
            color: #fff;
            text-decoration: none;
            padding: 10px 60px;
            border-radius: 2px;
            font-weight: bold;
            font-size: 1.3em;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .play-btn:hover { background: var(--steam-green-hover); }

        .stat-box { font-size: 0.8em; color: var(--text-muted); line-height: 1.4; }
        .stat-box b { color: #fff; display: block; font-size: 1.1em; }

        /* Dashboard Content */
        .content { padding: 40px; }
        .activity-feed {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 4px;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">Games</div>
        <div class="game-list" id="gameList">
            <!-- Items must match the keys in the JS object below -->
            <div class="sidebar-item active" onclick="switchGame('baldiclassic')">Baldi's Basics</div>
            <div class="sidebar-item" onclick="switchGame('baldiyuri')">BBCR</div>
            <div class="sidebar-item" onclick="switchGame('sub')">Subterbaldi</div>
            <div class="sidebar-item" onclick="switchGame('eagler152')">Eaglercraft 1.5.2</div>
            <div class="sidebar-item" onclick="switchGame('eagler')">EaglercraftX 1.8</div>
            <div class="sidebar-item" onclick="switchGame('eagler12')">Eaglercraft 1.12</div>
            <!-- This has been commented due to the games not actually being released. -->
            <!-- <div class="sidebar-item" onclick="switchGame('sus')">Among Us</div> -->
        </div>
    </div>

    <div class="main-view">
        <div class="hero" id="heroBg">
            <h1 id="gameTitle">Pick a game...</h1>
        </div>

        <div class="action-bar">
            <a href="#" id="playLink" class="play-btn">Play</a>
        </div>

        <div class="content">
            <div class="activity-feed">
                <h3 style="margin-top:0">Game Summary</h3>
                <p id="gameDesc">Choose a game to see its description!</p>
            </div>
        </div>
    </div>

    <script>
        const gameData = {
            'eagler152': {
                title: 'EAGLERCRAFT 1.5.2',
                url: 'eaglercraft/eaglerclassic.html',
                desc: 'The classic "Redstone Update" experience. Simple, nostalgic, and fully compatible with vintage servers.'
            },
            'eagler': {
                title: 'EAGLERCRAFTX 1.8',
                url: 'eaglercraft/eaglerx.html',
                desc: 'The definitive web-based Minecraft experience. Featuring the "Bountiful Update" with guardians, banners, and full cross-server support.'
            },
            'eagler12': {
                title: 'EAGLERCRAFT 1.12',
                url: 'eaglercraft/eaglermodern.html',
                desc: 'The "World of Colour" update. Featuring advanced technical blocks, concrete, and improved seafaring.'
            },
            'baldiclassic': {
                title: 'BALDIS BASICS',
                url: 'baldiclassic/',
                desc: '[This port will no longer be updated due to BaldiYuri being better.] Popular indie game from 2018 inspired by games like Sonics Schoolhouse! This HTML build is still under development, and cool features could show up in the future!'
            },
            'baldiyuri': {
                title: 'BALDIS BASICS CLASSIC REMASTERED',
                url: 'baldiyuri/',
                desc: 'A webport of the remastered game we all love! This is under early development!'
            },
            'sub': {
                title: 'SUBTERBALDI',
                url: 'sub/',
                desc: 'A Baldi mod inspired by a Sonic horror AU!'
            },
            'sus': {
                title: 'AMONG US',
                url: 'placeholder.html',
                desc: 'A game of teamwork and betrayal. Find the Impostors before the crew falls, or sabotage your way to victory.'
            }
        };

        function switchGame(gameKey) {
            const data = gameData[gameKey];
            
            // Update Text
            document.getElementById('gameTitle').innerText = data.title;
            document.getElementById('playLink').href = data.url;
            document.getElementById('gameDesc').innerText = data.desc;

            // Update Sidebar UI
            const items = document.querySelectorAll('.sidebar-item');
            items.forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
