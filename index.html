<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IWT</title>
    <style>
        :root {
            --steam-dark: #1b2838;
            --steam-sidebar: #2a475e;
            --steam-blue: #66c0f4;
            --text-light: #c6d4df;
            --text-muted: #8f98a0;
            --steam-black: #171d24;
            --steam-card-bg: #202c39;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--steam-dark);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background-color: var(--steam-black);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px 20px 10px 20px;
            font-size: 0.8em;
            font-weight: bold;
            color: var(--steam-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .game-list {
            flex: 1;
            overflow-y: auto;
        }
        .sidebar-item {
            padding: 6px 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.85em;
            cursor: pointer;
            transition: 0.2s;
        }
        .sidebar-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .sidebar-item.active { background: var(--steam-sidebar); color: #fff; }
        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #2a4054 0%, #1b2838 100%);
        }
        .grid-container {
            flex: 1;
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 25px;
            overflow-y: auto;
        }
        .grid-container::-webkit-scrollbar { width: 10px; }
        .grid-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .grid-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }
        .grid-container::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        .game-card {
            background-color: var(--steam-card-bg);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 2 / 3;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), 0 0 1px 1px var(--steam-blue);
        }
        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
            padding: 30px 10px 10px 10px;
            font-size: 0.85em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">Games</div>
        <div class="game-list" id="sidebarList">
            </div>
    </div>

    <div class="main-view">
        <div class="grid-container" id="gridContainer">
            </div>
    </div>

    <script>
const gameData = {
            'eaglerroot': { 
                title: 'Eaglercraft', 
                url: 'eaglercraftroot.html',
				banner: 'banners/placeholderbanner.jpg'
                //banner: 'banners/eaglercraft.jpg'
            },
            'baldiroot': { 
                title: "Baldi's Basics", 
                url: 'baldigames.html',
                banner: 'banners/baldiclassic.jpg'
            },
            'jsnesplaceholder': { 
                title: "JSNES Test (Super Mario Bros.)", 
                url: 'nes/frontend/smb.html',
                banner: 'banners/smb.jpg'
            },
        };
        const gridContainer = document.getElementById('gridContainer');
        const sidebarList = document.getElementById('sidebarList');

        Object.keys(gameData).forEach(key => {
            const game = gameData[key];
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => window.location.href = game.url;
			card.innerHTML = `
                <img src="${game.banner || 'banners/placeholderbanner.png'}" alt="${game.title}">
                <div class="card-info">${game.title}</div>
            `;
            gridContainer.appendChild(card);
            const sidebarItem = document.createElement('div');
            sidebarItem.className = 'sidebar-item';
            sidebarItem.innerText = game.title;
            sidebarItem.onclick = () => window.location.href = game.url;
            sidebarList.appendChild(sidebarItem);
        });	
    </script>
</body>
</html>
