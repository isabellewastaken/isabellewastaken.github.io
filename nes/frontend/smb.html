<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<style>
		body {
			/* Set the general page background color */
			background-color: #5c94fc;
			color: #ffffff;           /* Pure White */
			background-image: radial-gradient(#4b7ae2 3px, transparent 1px);
			background-size: 10px 10px; /* Adjust size to change grid density */
			    /* This stack picks the best clean font on any device */
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			    /* Creates a crisp 1px black outline */
			text-shadow: 
				-2px -2px 0 #333333,  
				2px -2px 0 #333333,
				-2px  2px 0 #333333,
				2px  2px 0 #333333;
		}
    
			/* Modern spacing for better readability */
			line-height: 1.6;
			-webkit-font-smoothing: antialiased; /* Makes text look smoother */

			#nes canvas {
				border: 4px solid #fff; /* Optional: adds a classic black border */
			}
	</style>

    <title>Super Mario Bros.</title>
    <script
      type="text/javascript"
      src="https://unpkg.com/jsnes@2/dist/jsnes.min.js"
    ></script>
    <script>
      window.onload = function () {
        var browser = new jsnes.Browser({
          container: document.getElementById("nes"),
          onError: function (e) {
            console.error(e);
          },
        });
        jsnes.Browser.loadROMFromURL(
          "../roms/smb.nes",
          function (err, data) {
            if (err) {
              console.error(err);
              return;
            }
            browser.loadROM(data);
          },
        );
      };
    </script>
  </head>
  <body>
    <div id="nes" style="margin: auto; width: 768px; height: 720px"></div>
    <p>
      DPad: Arrow keys<br />
      Start: Enter, Select: Right Ctrl<br />
      A: X, B: Z<br />
	  The frame is small, yes. I am currently working on fixing this. Thank you for your patience.
    </p>
  </body>
</html>
