<!DOCTYPE html>
<html>
<head>
    <title>Educraft Pre-Survival Test</title>
    <style>
        body {
            font-family: Verdana, sans-serif;
            font-size: 18pt;
            color: gray;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;

        }

        a:hover {
            background: #e0e0e0;
            border-color: #999;
        }

        /* Warning Style for the Broken Update */
        .btn-danger {
            color: #721c24 !important;
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
        }

        .btn-danger:hover {
            background-color: #f1b0b7 !important;
        }

        /* Disabled Style for Survival Test */
        .btn-disabled {
            background-color: #eee !important;
            color: #bbb !important;
            border-color: #ddd !important;
            cursor: not-allowed;
            pointer-events: none; /* Prevents clicking */
        }

        a:active:not(.btn-disabled) {
            transform: translateY(2px);
        }

        b { font-weight: bold; }

</head>
