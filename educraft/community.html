<!DOCTYPE html>
<html>
<head>
    <title>Educraft Community</title>
    <style>
        body {
            background-color: #1a1a1a; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #ccc;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .main-wrapper {
            width: 1000px;
            background-color: #000;
            padding: 40px 60px;
            min-height: 100vh;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
            position: relative;
        }

        /* Top Navigation */
        .header-nav {
            margin-bottom: 40px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links a { 
            color: #333; 
            text-decoration: none; 
            margin-left: 20px; 
            font-weight: bold;
            cursor: not-allowed; 
        }

        .content-flex {
            display: flex;
            gap: 60px;
        }

        .video-side { flex: 1.5; }
        
        .play-side {
            flex: 1;
            text-align: center;
            background: #0a0a0a;
            padding: 30px 20px;
            border: 2px solid #1a1025;
        }

        /* The Plain Green Rectangle Mob */
        .test-mob {
            width: 50px;
            height: 90px;
            background-color: #2d5a27; 
            margin: 0 auto 20px auto;
            border: 4px solid #4caf50;
            box-shadow: inset 4px 4px 0 rgba(255,255,255,0.1);
        }

        /* The "Play Now!" Button */
        .btn-play {
            display: block;
            background: linear-gradient(to bottom, #ffaa00 0%, #ff8800 100%);
            border: 1px solid #000;
            border-bottom: 5px solid #b35900;
            color: white;
            padding: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 22pt;
            text-shadow: 2px 2px #884400;
        }

        .btn-play:hover { background: linear-gradient(to bottom, #ffbb11 0%, #ff9911 100%); }

        .highlight { color: #bbb; font-weight: bold; }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border: 2px solid #1a1025;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* The "Last Commit" Dev Footer */
        .dev-footer {
            margin-top: 100px;
            text-align: center;
            font-size: 9pt;
            color: #222;
            border-top: 1px solid #111;
            padding: 20px 0;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header-nav">
        <span style="font-weight: bold; font-size: 16pt; color: #fff; letter-spacing: 1px;">EDUCRAFT</span>
        <div class="nav-links">
            <a href="index.html">Home</a> <a href="#">Game</a> <a href="community.html">Community</a> <a href="#">Profile</a>
        </div>
    </div>

    <div class="content-flex">
        <div class="video-side">
            <div class="video-container">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/omxm-xdUiok?si=qTxRIt4RCsUgWXoZ&amp;controls=0" title="TrailerFrame" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
            
            <div style="margin-top: 25px; line-height: 1.8;">
                <p>Welcome to the community page of Educraft! <span class="highlight">This is under heavy construction!</span></p>
            </div>
        </div>

        <div class="play-side">
            <div class="test-mob"></div>
            
            <a href="game.html" class="btn-play">Play Now!</a>
            
            <p style="font-size: 10pt; color: #444; margin-top: 15px;">
                Alpha a0.5.0
            </p>
        </div>
    </div>

    <div class="dev-footer">
        <b>Copyright information will be added here in Beta.</b>
    </div>
</div>

</body>
</html>
