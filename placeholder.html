<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSteam Beta</title>
    <style>
        :root {
            --steam-dark: #1b2838;
            --steam-blue: #66c0f4;
            --text-muted: #8f98a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--steam-dark);
            color: #c6d4df;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* Creates a blurred 'steam' background effect */
            background: radial-gradient(circle at center, #2a475e 0%, #1b2838 100%);
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 60px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 500px;
        }

        .icon {
            font-size: 4em;
            color: var(--steam-blue);
            margin-bottom: 20px;
            /* Simple pulsing animation like a Steam download */
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 2em;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            color: var(--steam-blue);
            border: 1px solid var(--steam-blue);
            padding: 10px 25px;
            border-radius: 2px;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: var(--steam-blue);
            color: var(--steam-dark);
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.4; transform: scale(0.95); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">⌛</div>
        <h1>Under Construction</h1>
        <p>This game is currently being compiled or added to the EduSteam Beta library. Please check back later!</p>
        
        <!-- This takes the friend/user back to your main Hub -->
        <a href="index.html" class="btn-back">RETURN TO LIBRARY</a>
    </div>

</body>
</html>
